version: 1.0
runtime: python311
build:
  commands:
    build:
      # 1. Instalar dependencias del sistema necesarias para compilar librerias
      - dnf install -y gcc python3-devel postgresql-devel
      # 2. Crear un entorno virtual explícito en la carpeta del proyecto
      - python3 -m venv venv
      # 3. Actualizar pip dentro del entorno virtual
      - ./venv/bin/pip install --upgrade pip
      # 4. Instalar librerías DENTRO del entorno virtual
      - ./venv/bin/pip install -r requirements.txt
      # 5. Verificar instalación
      - ./venv/bin/pip list
run:
  # Usamos el python del entorno virtual para arrancar
  command: ./venv/bin/python -m uvicorn main_api:app --host 0.0.0.0 --port 8000
  network:
    port: 8000
  env:
    - name: APP_PORT
      value: "8000"
    - name: S3_BUCKET_NAME
      value: "finansuenos-reportes-privados"
    - name: AWS_REGION
      value: "us-east-1"
    - name: ENVIRONMENT
      value: "production"