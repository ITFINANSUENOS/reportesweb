version: 1.0
runtime: python3
build:
  commands:
    build:
      - yum install -y gcc libpq-devel
      - pip install -r requirements.txt
run:
  command: uvicorn main_api:app --host 0.0.0.0 --port 8000
  # CORRECTO: 'env' es hermano de 'network', no hijo.
  env:
    APP_PORT: "8000"
  network:
    port: 8000
