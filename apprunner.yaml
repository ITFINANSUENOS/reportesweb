version: 1.0
runtime: python311
build:
  commands:
    build:
      # Usamos dnf (gestor moderno) e instalamos gcc y herramientas de desarrollo
      - dnf install -y gcc python3-devel postgresql-devel
      # Actualizamos pip antes de instalar
      - python -m pip install --upgrade pip
      # Instalamos las dependencias
      - python -m pip install -r requirements.txt
run:
  command: uvicorn main_api:app --host 0.0.0.0 --port 8000
  network:
    port: 8000
  env:
    - name: APP_PORT
      value: "8000"